services:
  slot-eureka-server:
    image: tykhegaming/slot-eureka-server:latest
    container_name: slot-eureka-server
    ports:
      - "8761:8761"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 1024M
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:InitialRAMPercentage=75.0 -XX:MaxRAMPercentage=75.0 -XX:MaxMetaspaceSize=384m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Xlog:gc:stdout:time,uptime,level,tags

  slot-api-gateway:
    image: tykhegaming/slot-api-gateway:latest
    container_name: slot-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - slot-eureka-server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '1.0'
          memory: 1024M
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=your-super-secret-key-that-is-at-least-32-bytes-long
      - EUREKA_HOST=http://slot-eureka-server:8761/eureka/
      - SERVER_PORT=8080
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:InitialRAMPercentage=75.0 -XX:MaxRAMPercentage=75.0 -XX:MaxMetaspaceSize=384m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Xlog:gc:stdout:time,uptime,level,tags

  slot-auth-service-9091:
    image: tykhegaming/slot-auth-service:latest
    container_name: slot-auth-service
    ports:
      - "9091:9091"
    depends_on:
      - slot-eureka-server
    deploy:
        resources:
            limits:
              cpus: '1.0'
              memory: 1024M
            reservations:
              cpus: '1.0'
              memory: 1024M
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=your-super-secret-key-that-is-at-least-32-bytes-long
      - JWT_PLAYER_SEESION_EXPIRATION=3600000
      - JWT_EMPLOYEE_SEESION_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=7200000
      - EUREKA_HOST=http://slot-eureka-server:8761/eureka/
      - SERVER_PORT=9091
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:InitialRAMPercentage=75.0 -XX:MaxRAMPercentage=75.0 -XX:MaxMetaspaceSize=384m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Xlog:gc:stdout:time,uptime,level,tags