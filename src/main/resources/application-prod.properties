spring.application.name=slot-auth-service

spring.datasource.url=jdbc:postgresql://localhost:5432/slot-auth-db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.player-session-expiration=${JWT_PLAYER_SEESION_EXPIRATION:3600000}
jwt.employee-session-expiration=${JWT_EMPLOYEE_SESSION_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:7200000}
jwt.issuer=slot-auth-service